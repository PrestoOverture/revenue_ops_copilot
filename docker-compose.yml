services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: revops
      POSTGRES_PASSWORD: revops
      POSTGRES_DB: revops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revops"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.22
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=revops
      - POSTGRES_PWD=revops
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f temporal-server >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

volumes:
  pgdata:
